<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ANEIMERA · Prototipo C</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root { --c-accent: oklch(0.55 0.16 26); --c-accent-soft: oklch(0.95 0.04 26); --c-accent-ink: oklch(0.45 0.18 26); }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; color: #0a0a0a; background: #fff; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  ::selection { background: var(--c-accent); color: #fff; }

  /* CMS edit overlay */
  body.cms-mode [data-cms-path] {
    outline: 1px dashed transparent; outline-offset: 2px; transition: outline-color .15s, background .15s; cursor: text;
  }
  body.cms-mode [data-cms-path]:hover { outline-color: var(--c-accent); background: oklch(0.97 0.03 26 / .5); }
  body.cms-mode [data-cms-path].cms-active { outline-color: var(--c-accent); background: oklch(0.95 0.04 26 / .6); }
  body.cms-mode [data-cms-path]::after {
    content: attr(data-cms-path); position: absolute; transform: translate(0, -100%); font-family: 'JetBrains Mono', monospace;
    font-size: 9px; padding: 2px 6px; background: #0a0a0a; color: #fff; border-radius: 0 0 4px 0;
    opacity: 0; pointer-events: none; transition: opacity .12s; letter-spacing: 0.04em;
  }
  body.cms-mode [data-cms-path]:hover::after { opacity: 1; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="js/c-content.jsx"></script>

  <script type="text/babel">
    function App() {
      const [page, setPage] = React.useState(() => {
        const params = new URLSearchParams(location.search);
        return params.get("page") || "home";
      });

      return <div style={{padding: '2rem', textAlign: 'center', color: '#999'}}>Prototipo-C — esta página no se está usando</div>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
