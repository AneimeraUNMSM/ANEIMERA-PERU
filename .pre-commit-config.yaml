repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-yaml
      - id: check-json

  - repo: local
    hooks:
      - id: site-check
        name: site-check
        entry: python tools/check_site.py
        language: system
        pass_filenames: false
