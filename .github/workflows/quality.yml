name: Quality Checks

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install pre-commit
        run: python -m pip install --upgrade pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files
