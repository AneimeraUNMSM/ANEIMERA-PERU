<body class="bg-background text-on-background antialiased selection:bg-primary-container selection:text-on-primary-container grid-bg min-h-screen flex flex-col">

    <main class="pt-32 pb-16 px-8 md:px-margin max-w-container-max mx-auto flex-grow w-full" id="capitulo-container">
        <div class="animate-pulse">
            <div class="grid grid-cols-12 gap-gutter mb-16"><div class="col-span-8 h-32 bg-surface-variant"></div><div class="col-span-4 h-48 bg-surface-variant"></div></div>
            <div class="h-96 bg-surface-variant"></div>

    </main>

    <footer class="w-full py-12 px-8 md:px-16 flex flex-col md:flex-row justify-between items-start gap-8 bg-black border-t-4 border-primary-container mt-auto">

        <div class="flex gap-6 font-inter uppercase text-[10px] tracking-widest text-white">
            <a class="text-zinc-400 hover:text-white" href="../pages/directorio.html">Directorio Nacional</a>
            <a class="text-zinc-400 hover:text-white" href="../index.html">Estatutos</a>
            <a class="text-zinc-400 hover:text-white" href="../index.html">Contacto</a>
        </div>
        <div class="text-zinc-400 font-inter uppercase text-[10px] tracking-widest">© 2026 ANEIMERA PERÚ | ASOCIACIÓN NACIONAL DE ESTUDIANTES DE INGENIERÍA</div>
    </footer>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
      import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

      const app = initializeApp({
        apiKey: "AIzaSyCNW5JWDEO8BgfpUODrhUNy7p1P0ZEecJE", authDomain: "aneimera-peru.firebaseapp.com",
        projectId: "aneimera-peru", storageBucket: "aneimera-peru.firebasestorage.app",
        messagingSenderId: "706894806005", appId: "1:706894806005:web:e238c117955b77d011febc"
      });
      const db = getFirestore(app);

      const escapeHTML = (str) => {
          if (!str) return '';
          return String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
      };

      async function loadCapitulo() {
          const container = document.getElementById('capitulo-container');
          if (!container) return;
          const urlParams = new URLSearchParams(window.location.search);
          const capId = urlParams.get('id');

          if (!capId) {
              container.innerHTML = `<div class="text-center py-32"><span class="material-symbols-outlined text-8xl text-surface-dim mb-6">error_outline</span><h2 class="font-headline-sm text-headline-sm uppercase mb-4">Parámetro Inválido</h2><p class="font-body-md text-tertiary mb-8">No se especificó un ID de capítulo.</p><a href="../index.html" class="inline-block bg-black text-white font-inter font-bold uppercase px-8 py-3 hover:bg-primary transition-colors">Regresar</a></div>`;
              return;
          }

          try {
              const docSnap = await getDoc(doc(db, "capitulos", capId));

              if (docSnap.exists()) {
                  const d = docSnap.data();
                  const safeCodigo = escapeHTML(d.codigo);
                  const safeUniversidad = escapeHTML(d.universidad);
                  const safeFacultad = escapeHTML(d.facultad);
                  const safeSede = escapeHTML(d.sede);
                  const safeEstado = escapeHTML(d.estado);
                  const safeMision = escapeHTML(d.mision || 'Misión operativa no definida.');
                  const safeAnio = escapeHTML(d.anioFundacion || '—');
                  const junta = d.juntaDirectiva || [];
                  const proyectos = d.proyectos || [];

                  document.title = `${d.universidad} - ${d.facultad} | ANEIMERA PERÚ`;

                  // Estado badge color
                  const estadoColors = {
                      'ACTIVO': 'bg-green-600 text-white',
                      'EN FORMACIÓN': 'bg-yellow-500 text-black',
                      'INACTIVO': 'bg-neutral-400 text-white'
                  };
                  const estadoClass = estadoColors[d.estado] || 'bg-neutral-400 text-white';

                  // Build Junta Directiva
                  const cargoColors = ['bg-primary-container text-on-primary-container', 'bg-on-surface text-surface', 'bg-on-surface text-surface', 'bg-secondary text-white', 'bg-tertiary-container text-on-tertiary-container'];
                  let juntaHTML = '';
                  if (junta.length > 0) {
                      const cards = junta.map((j, i) => `
                        <div class="border-2 border-on-surface bg-white group hover:-translate-y-1 transition-transform duration-200">
                            <div class="h-48 bg-surface-dim border-b-2 border-on-surface relative overflow-hidden flex items-center justify-center">
                                <span class="material-symbols-outlined text-8xl text-surface-container-high">person</span>
                                <div class="absolute top-0 right-0 ${cargoColors[i % cargoColors.length]} font-label-mono text-label-mono px-3 py-1 border-b-2 border-l-2 border-on-surface">${escapeHTML(j.cargo || 'MIEMBRO')}</div>
                            </div>
                            <div class="p-6">
                                <h3 class="font-headline-sm text-[24px] uppercase mb-1 font-bold">${escapeHTML(j.nombre)}</h3>
                                <p class="font-label-mono text-label-mono text-on-surface-variant uppercase">${escapeHTML(j.carrera || '')}</p>
                            </div>
                        </div>
                      `).join('');

                      juntaHTML = `
                        <section class="border-t-2 border-on-surface pt-16">
                            <div class="flex items-center justify-between mb-12">
                                <h2 class="font-headline-md text-headline-md uppercase">Junta Directiva</h2>
                                <div class="h-px bg-on-surface flex-grow ml-8 hidden md:block"></div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">${cards}</div>
                        </section>`;
                  }

                  // Build Proyectos
                  let proyectosHTML = '';
                  if (proyectos.length > 0) {
                      const mainProy = proyectos[0];
                      const secondaryProys = proyectos.slice(1);

                      let secondaryHTML = secondaryProys.map((p, i) => {
                          const bg = i % 2 === 0 ? 'bg-surface-container border-2 border-on-surface' : 'bg-primary-container text-on-primary-container border-2 border-primary-container';
                          return `
                            <div class="${bg} p-6 hover:bg-on-surface hover:text-surface transition-colors group cursor-pointer flex flex-col justify-between">
                                <div>
                                    <span class="font-label-mono text-label-mono mb-2 block border-b border-current pb-2">${escapeHTML(p.tipo || 'PROYECTO')}</span>
                                    <h4 class="font-headline-sm text-[24px] uppercase mb-4 font-bold">${escapeHTML(p.titulo)}</h4>
                                    <p class="font-body-md text-body-md opacity-80">${escapeHTML(p.descripcion || '')}</p>
                                </div>
                                <div class="mt-8 flex justify-end"><span class="material-symbols-outlined">arrow_forward</span></div>
                            </div>`;
                      }).join('');

                      proyectosHTML = `
                        <section class="border-t-2 border-on-surface pt-16">
                            <div class="flex items-center gap-4 mb-12">
                                <span class="material-symbols-outlined text-4xl">engineering</span>
                                <h2 class="font-headline-md text-headline-md uppercase">Proyectos Destacados</h2>
                            </div>
                            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                <div class="lg:col-span-8 border-2 border-on-surface bg-white relative">
                                    <div class="h-64 relative border-b-2 border-on-surface overflow-hidden bg-gradient-to-br from-black to-primary-container/40 flex items-center justify-center">
                                        <span class="material-symbols-outlined text-[120px] text-white/20">rocket_launch</span>
                                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                                        <div class="absolute bottom-6 left-6 right-6">
                                            <span class="bg-primary-container text-on-primary-container font-label-mono text-label-mono px-2 py-1 mb-3 inline-block">${escapeHTML(mainProy.tipo || 'PROYECTO INSIGNIA')}</span>
                                            <h3 class="font-headline-lg text-[48px] text-white uppercase leading-none font-bold">${escapeHTML(mainProy.titulo)}</h3>
                                        </div>
                                    </div>
                                    <div class="p-8">
                                        <p class="font-body-md text-body-md text-on-surface-variant">${escapeHTML(mainProy.descripcion || '')}</p>
                                    </div>
                                </div>
                                <div class="lg:col-span-4 flex flex-col gap-6">${secondaryHTML}</div>
                            </div>
                        </section>`;
                  }

                  container.innerHTML = `
                    <!-- Header Section (Same as reference) -->
                    <header class="grid grid-cols-1 md:grid-cols-12 gap-gutter relative mb-16">
                        <div class="md:col-span-8 flex flex-col justify-end">
                            <div class="flex items-center gap-3 mb-4">
                                <span class="font-label-mono text-label-mono text-primary-container uppercase tracking-widest border-b border-primary-container pr-4 pb-1">ID: ${safeCodigo}</span>
                                <span class="${estadoClass} font-label-mono text-label-mono px-2 py-0.5 uppercase">${safeEstado}</span>
                            </div>
                            <h1 class="font-headline-lg text-[36px] md:text-headline-lg text-on-surface uppercase mb-4">
                                ${safeUniversidad}<br/><span class="text-tertiary">${safeFacultad}</span>
                            </h1>
                            <p class="font-label-mono text-label-mono text-tertiary uppercase">${safeSede}</p>
                        </div>
                        <div class="md:col-span-4 bg-on-surface text-surface p-8 border-t-4 border-primary-container shadow-[8px_8px_0px_0px_#e30613] flex flex-col justify-between">
                            <div>
                                <div class="flex items-center gap-2 mb-4 border-b border-surface/20 pb-2">
                                    <span class="material-symbols-outlined text-primary-container">target</span>
                                    <span class="font-label-mono text-label-mono uppercase">Misión Operativa</span>
                                </div>
                                <p class="font-body-md text-body-md">${safeMision}</p>
                            </div>
                            <div class="mt-8 font-label-mono text-label-mono text-surface/50 text-right">
                                EST. ${safeAnio}
                            </div>
                        </div>
                    </header>

                    <!-- Junta Directiva -->
                    ${juntaHTML}

                    <!-- Proyectos -->
                    ${proyectosHTML}

                    <!-- Contact CTA (Same as reference) -->
                    <section class="bg-on-surface text-surface border-4 border-on-surface p-12 mt-16 relative overflow-hidden">
                        <div class="absolute inset-0 opacity-10" style="background-image: linear-gradient(to right, #ffffff 1px, transparent 1px), linear-gradient(to bottom, #ffffff 1px, transparent 1px); background-size: 40px 40px;"></div>
                        <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-8">
                            <div class="max-w-2xl">
                                <h2 class="font-headline-lg text-[32px] md:text-[48px] uppercase mb-4 font-bold">Conecta con el Capítulo</h2>
                                <p class="font-body-lg text-body-lg text-surface-dim">
                                    ¿Interesado en participar en nuestros proyectos, proponer una alianza o conocer más sobre nuestras actividades? Inicia la comunicación directa con nuestra directiva.
                                </p>
                            </div>
                            <a href="../index.html" class="bg-primary-container text-on-primary-container font-headline-sm text-[24px] uppercase px-12 py-6 border-2 border-transparent hover:bg-surface hover:text-on-surface hover:border-on-surface transition-all flex items-center gap-4 flex-shrink-0 shadow-[8px_8px_0px_0px_#ffffff] active:translate-y-1 active:shadow-[4px_4px_0px_0px_#ffffff] font-bold">
                                CONTACTAR
                                <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">mail</span>
                            </a>
                        </div>
                    </section>
                  `;
              } else {
                  container.innerHTML = `<div class="text-center py-32"><span class="material-symbols-outlined text-8xl text-surface-dim mb-6">domain_disabled</span><h2 class="font-headline-sm text-headline-sm uppercase mb-4">Capítulo No Encontrado</h2><p class="font-body-md text-tertiary mb-8">El capítulo que buscas no existe o fue desactivado.</p><a href="../index.html" class="inline-block bg-black text-white font-inter font-bold uppercase px-8 py-3 hover:bg-primary transition-colors">Regresar al Portal</a></div>`;
              }
          } catch (error) {
              console.error("Error:", error);
              container.innerHTML = `<div class="text-center py-32 text-primary"><span class="material-symbols-outlined text-8xl mb-6">wifi_off</span><h2 class="font-headline-sm text-headline-sm uppercase mb-4">Error de Conexión</h2><p class="font-body-md text-tertiary">No se pudo cargar la información del capítulo.</p></div>`;
          }
      }

      loadCapitulo();
    </script>
</body>
</html>
