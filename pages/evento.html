    </footer>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
      import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCNW5JWDEO8BgfpUODrhUNy7p1P0ZEecJE", authDomain: "aneimera-peru.firebaseapp.com",
        projectId: "aneimera-peru", storageBucket: "aneimera-peru.firebasestorage.app",
        messagingSenderId: "706894806005", appId: "1:706894806005:web:e238c117955b77d011febc", measurementId: "G-HXTQ9VHVXF"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      const escapeHTML = (str) => {
          if (!str) return '';
          return String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
      };

      async function loadEvento() {
          const container = document.getElementById('evento-container');
          if (!container) return;
          const urlParams = new URLSearchParams(window.location.search);
          const eventId = urlParams.get('id');

          if (!eventId) {
              container.innerHTML = `<div class="text-center py-32 max-w-lg mx-auto"><span class="material-symbols-outlined text-8xl text-surface-dim mb-6">error_outline</span><h2 class="font-headline-sm text-headline-sm uppercase mb-4">Parámetro Inválido</h2><p class="font-body-md text-tertiary mb-8">No se ha especificado un ID de evento válido.</p><a href="../index.html" class="inline-block bg-black text-white font-inter font-bold uppercase px-8 py-3 hover:bg-primary transition-colors">Regresar</a></div>`;
              return;
          }

          try {
              const docRef = doc(db, "eventos", eventId);
              const docSnap = await getDoc(docRef);

              if (docSnap.exists()) {
                  const data = docSnap.data();
                  
                  const safeTitulo = escapeHTML(data.titulo);
                  const safeDesc = typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(data.descripcion) : escapeHTML(data.descripcion);
                  const safeLugar = escapeHTML(data.lugar);
                  const safeTipo = escapeHTML(data.tipo || 'EVENTO');
                  const safeRefId = escapeHTML(data.eventId || docSnap.id);
                  const safeLinkForms = escapeHTML(data.linkForms || '');
                  const safeImagenUrl = escapeHTML(data.imagenUrl || '');
                  const safeHora = escapeHTML(data.hora || '');
                  const cronograma = data.cronograma || [];
                  const requisitos = data.requisitos || [];

                  // Parse date
                  const monthMap = { '01':'Enero', '02':'Febrero', '03':'Marzo', '04':'Abril', '05':'Mayo', '06':'Junio', '07':'Julio', '08':'Agosto', '09':'Septiembre', '10':'Octubre', '11':'Noviembre', '12':'Diciembre' };
                  const parts = (data.fecha || '').split('-');
                  const day = parts[2] || '00';
                  const monthName = monthMap[parts[1]] || 'Mes';
                  const year = parts[0] || '2026';

                  // Format time
                  let timeStr = '';
                  if (safeHora) {
                      const [h, m] = safeHora.split(':');
                      const hNum = parseInt(h);
                      timeStr = ` • ${hNum > 12 ? hNum-12 : hNum}:${m} ${hNum >= 12 ? 'PM' : 'AM'}`;
                  }

                  document.title = `${data.titulo} | ANEIMERA PERÚ`;

                  // Build cronograma HTML
                  let cronogramaHTML = '';
                  if (cronograma.length > 0) {
                      const items = cronograma.map(c => `
                        <div class="p-6 grid grid-cols-1 md:grid-cols-4 gap-4 hover:bg-surface-container-low transition-colors">
                            <div class="md:col-span-1 font-label-mono text-label-mono text-tertiary">${escapeHTML(c.hora)}</div>
                            <div class="md:col-span-3">
                                <h3 class="font-body-lg text-body-lg font-bold text-on-surface mb-2">${escapeHTML(c.titulo)}</h3>
                                <p class="font-body-md text-body-md text-tertiary">${escapeHTML(c.descripcion)}</p>
                                ${c.ponente ? `<div class="mt-2 text-sm font-medium text-secondary flex items-center gap-1"><span class="material-symbols-outlined text-sm">person</span> ${escapeHTML(c.ponente)}</div>` : ''}
                            </div>
                        </div>
                      `).join('');

                      cronogramaHTML = `
                        <div class="border-2 border-black bg-white">
                            <div class="bg-secondary text-on-secondary px-6 py-3 border-b-2 border-black flex items-center gap-2">
                                <span class="material-symbols-outlined">schedule</span>
                                <h2 class="font-headline-sm text-[24px] uppercase tracking-tight">Cronograma Técnico</h2>
                            </div>
                            <div class="divide-y divide-black/20">${items}</div>
                        </div>`;
                  }

                  // Build requisitos HTML
                  let requisitosHTML = '';
                  if (requisitos.length > 0) {
                      const reqItems = requisitos.map(r => `
                        <li class="flex items-start gap-3">
                            <span class="material-symbols-outlined text-primary mt-1 text-lg">check_box</span>
                            <span>${escapeHTML(r)}</span>
                        </li>
                      `).join('');

                      requisitosHTML = `
                        <div class="border-2 border-black bg-surface-container-highest p-6 relative overflow-hidden">
                            <div class="absolute inset-0 pointer-events-none opacity-5" style="background-image: radial-gradient(#000 1px, transparent 1px); background-size: 16px 16px;"></div>
                            <h3 class="font-headline-sm text-[24px] uppercase text-on-background mb-4 border-b-2 border-black pb-2 flex items-center gap-2">
                                <span class="material-symbols-outlined text-primary">engineering</span>
                                Requisitos
                            </h3>
                            <ul class="font-body-md text-body-md text-on-surface space-y-4">${reqItems}</ul>
                        </div>`;
                  }

                  container.innerHTML = `
                    <!-- Hero Section -->
                    <section class="relative mb-16">
                        <div class="w-full h-[60vh] border-2 border-black bg-surface-container relative overflow-hidden group">
                            ${safeImagenUrl ? `<img alt="${safeTitulo}" class="w-full h-full object-cover grayscale mix-blend-multiply opacity-80 group-hover:grayscale-0 transition-all duration-500" src="${safeImagenUrl}"/>` : `<div class="w-full h-full bg-gradient-to-br from-black via-surface-container to-primary-container/20 flex items-center justify-center"><span class="material-symbols-outlined text-[200px] text-surface-dim">event</span></div>`}
                            <div class="absolute inset-0 bg-black/20"></div>

                            <!-- Floating Metadata Box -->
                            <div class="absolute bottom-8 right-8 bg-white border-2 border-black p-6 w-96 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] hidden md:block">
                                <div class="flex flex-col gap-4">
                                    <div>
                                        <span class="font-label-mono text-label-mono text-tertiary block mb-1">FECHA_Y_HORA</span>
                                        <div class="font-body-lg text-body-lg text-on-surface font-bold flex items-center gap-2">
                                            <span class="material-symbols-outlined text-primary">calendar_month</span>
                                            ${day} de ${monthName}, ${year}${timeStr}
                                        </div>
                                    </div>
                                    <div class="h-px bg-black w-full opacity-20"></div>
                                    <div>
                                        <span class="font-label-mono text-label-mono text-tertiary block mb-1">UBICACIÓN</span>
                                        <div class="font-body-lg text-body-lg text-on-surface font-bold flex items-center gap-2">
                                            <span class="material-symbols-outlined text-primary">location_on</span>
                                            ${safeLugar}
                                        </div>
                                    </div>
                                    ${safeLinkForms ? `
                                    <button onclick="window.open('${safeLinkForms}', '_blank')" class="mt-4 w-full bg-primary text-on-primary py-4 font-headline-sm text-headline-sm uppercase hover:bg-black transition-colors rounded-none border-2 border-primary hover:border-black flex justify-center items-center gap-2 group/btn">
                                        REGISTRARSE
                                        <span class="material-symbols-outlined group-hover/btn:translate-x-1 transition-transform">arrow_forward</span>
                                    </button>` : ''}
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- Event Details Layout (Same structure as reference) -->
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-gutter">
                        <!-- Main Content Column -->
                        <div class="lg:col-span-8 flex flex-col gap-16">
                            <!-- Title & Intro -->
                            <div>
                                <span class="font-label-mono text-label-mono text-primary bg-primary/10 px-2 py-1 mb-4 inline-block border border-primary/20">${safeRefId}</span>
                                <h1 class="font-headline-lg text-[36px] md:text-headline-lg text-on-background mb-6 uppercase">${safeTitulo}</h1>
                                <div class="font-body-lg text-body-lg text-tertiary max-w-3xl border-l-4 border-primary pl-4">
                                    ${safeDesc}
                                </div>
                            </div>

                            <!-- Schedule Section (Cronograma) -->
                            ${cronogramaHTML}
                        </div>

                        <!-- Sidebar Column -->
                        <div class="lg:col-span-4 flex flex-col gap-gutter">
                            <!-- Mobile Info (visible on small screens) -->
                            <div class="md:hidden border-2 border-black bg-white p-6">
                                <div class="flex flex-col gap-3">
                                    <div class="flex items-center gap-2 font-body-md"><span class="material-symbols-outlined text-primary">calendar_month</span><strong>${day} de ${monthName}, ${year}${timeStr}</strong></div>
                                    <div class="flex items-center gap-2 font-body-md"><span class="material-symbols-outlined text-primary">location_on</span><strong>${safeLugar}</strong></div>
                                    ${safeLinkForms ? `<button onclick="window.open('${safeLinkForms}', '_blank')" class="mt-2 w-full bg-primary text-on-primary py-3 font-inter font-bold uppercase hover:bg-black transition-colors flex justify-center items-center gap-2">REGISTRARSE <span class="material-symbols-outlined">arrow_forward</span></button>` : ''}
                                </div>
                            </div>

                            <!-- Requirements Card -->
                            ${requisitosHTML}

                            <!-- Share -->
                            <div class="border-2 border-black bg-white p-6">
                                <h4 class="font-label-mono text-label-mono uppercase mb-4 border-b border-black pb-2">COMPARTIR EVENTO</h4>
                                <button onclick="navigator.clipboard.writeText(window.location.href); this.innerText='¡ENLACE COPIADO!'" class="w-full border-2 border-black py-3 font-label-mono text-label-mono uppercase hover:bg-black hover:text-white transition-colors">COPIAR ENLACE</button>
                            </div>
                        </div>
                    </div>
                  `;
              } else {
                  container.innerHTML = `<div class="text-center py-32 max-w-lg mx-auto"><span class="material-symbols-outlined text-8xl text-surface-dim mb-6">event_busy</span><h2 class="font-headline-sm text-headline-sm uppercase mb-4">Evento No Encontrado</h2><p class="font-body-md text-tertiary mb-8">El evento que buscas no existe o ha sido eliminado.</p><a href="../index.html" class="inline-block bg-black text-white font-inter font-bold uppercase px-8 py-3 hover:bg-primary transition-colors">Regresar al Portal</a></div>`;
              }
          } catch (error) {
              console.error("Error obteniendo evento:", error);
              container.innerHTML = `<div class="text-center py-32 text-primary max-w-lg mx-auto"><span class="material-symbols-outlined text-8xl mb-6">wifi_off</span><h2 class="font-headline-sm text-headline-sm uppercase mb-4">Error de Conexión</h2><p class="font-body-md text-tertiary">No se pudo cargar la información del evento.</p></div>`;
          }
      }

      loadEvento();
    </script>
</body>
