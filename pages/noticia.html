<body class="bg-background text-on-background antialiased selection:bg-primary-container selection:text-on-primary-container grid-bg min-h-screen flex flex-col">

    <main class="pt-32 pb-16 px-8 md:px-margin max-w-container-max mx-auto flex-grow w-full" id="noticia-container">
        <div class="animate-pulse">
            <div class="w-full h-[50vh] bg-surface-container border-2 border-black mb-12"></div>
            <div class="max-w-3xl mx-auto"><div class="h-10 bg-surface-variant w-2/3 mb-6"></div><div class="h-64 bg-surface-variant w-full"></div></div>
        </div>
    </main>

    <footer class="w-full py-12 px-8 md:px-16 flex flex-col md:flex-row justify-between items-start gap-8 bg-black border-t-4 border-primary-container mt-auto">

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
      import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

      const app = initializeApp({
        apiKey: "AIzaSyCNW5JWDEO8BgfpUODrhUNy7p1P0ZEecJE", authDomain: "aneimera-peru.firebaseapp.com",
        projectId: "aneimera-peru", storageBucket: "aneimera-peru.firebasestorage.app",
        messagingSenderId: "706894806005", appId: "1:706894806005:web:e238c117955b77d011febc"
      });
      const db = getFirestore(app);

      const escapeHTML = (str) => {
          if (!str) return '';
          return String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
      };

      async function loadNoticia() {
          const container = document.getElementById('noticia-container');
          if (!container) return;
          const urlParams = new URLSearchParams(window.location.search);
          const noticiaId = urlParams.get('id');

          if (!noticiaId) {
              container.innerHTML = `<div class="text-center py-32"><span class="material-symbols-outlined text-8xl text-surface-dim mb-6">error_outline</span><h2 class="font-headline-sm text-headline-sm uppercase mb-4">Parámetro Inválido</h2><p class="font-body-md text-tertiary mb-8">No se especificó un ID de noticia.</p><a href="../index.html" class="inline-block bg-black text-white font-inter font-bold uppercase px-8 py-3 hover:bg-primary transition-colors">Regresar</a></div>`;
              return;
          }

          try {
              const docSnap = await getDoc(doc(db, "noticias", noticiaId));

              if (docSnap.exists()) {
                  const data = docSnap.data();
                  const safeTitulo = escapeHTML(data.titulo);
                  const safeBody = typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(data.descripcion) : escapeHTML(data.descripcion);
                  const safeCat = escapeHTML(data.categoria || 'GENERAL');
                  const safeRefId = escapeHTML(data.noticiaId || docSnap.id);
                  const safeImagenUrl = escapeHTML(data.imagenUrl || '');
                  const tags = data.tags || [];

                  // Format date from timestamp
                  const ts = data.timestamp;
                  let dateStr = 'Fecha no disponible';
                  if (ts && ts.toDate) {
                      const d = ts.toDate();
                      const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
                      dateStr = `${d.getDate()} de ${months[d.getMonth()]}, ${d.getFullYear()}`;
                  }

                  document.title = `${data.titulo} | ANEIMERA PERÚ`;

                  // Tags HTML
                  const tagsHTML = tags.length > 0 ? `<div class="flex flex-wrap gap-2 mt-8 pt-6 border-t-2 border-black">${tags.map(t => `<span class="bg-surface-container border border-black font-label-mono text-label-mono px-3 py-1 uppercase">${escapeHTML(t)}</span>`).join('')}</div>` : '';

                  container.innerHTML = `
                    <!-- Hero Image -->
                    <section class="mb-16">
                        <div class="w-full h-[50vh] border-2 border-black bg-surface-container relative overflow-hidden group">
                            ${safeImagenUrl ? `<img alt="${safeTitulo}" class="w-full h-full object-cover grayscale mix-blend-multiply opacity-80 group-hover:grayscale-0 transition-all duration-500" src="${safeImagenUrl}"/>` : `<div class="w-full h-full bg-gradient-to-br from-black via-surface-container to-primary-container/20 flex items-center justify-center"><span class="material-symbols-outlined text-[200px] text-surface-dim">article</span></div>`}
                            <div class="absolute inset-0 bg-black/20"></div>
                            <div class="absolute bottom-6 left-6 flex items-center gap-3">
                                <span class="bg-primary-container text-on-primary-container font-label-mono text-label-mono px-3 py-1 uppercase">${safeCat}</span>
                                <span class="bg-white/90 text-on-surface font-label-mono text-label-mono px-3 py-1">${dateStr}</span>
                            </div>
                        </div>
                    </section>

                    <!-- Article Layout -->
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-gutter">
                        <!-- Main Article -->
                        <article class="lg:col-span-8">
                            <span class="font-label-mono text-label-mono text-primary bg-primary/10 px-2 py-1 mb-4 inline-block border border-primary/20">${safeRefId}</span>
                            <h1 class="font-headline-lg text-[36px] md:text-headline-lg text-on-background uppercase mb-8">${safeTitulo}</h1>
                            <div class="article-body font-body-lg text-body-lg text-on-surface leading-relaxed">
                                ${safeBody}
                            </div>
                            ${tagsHTML}
                        </article>

                        <!-- Sidebar -->
                        <aside class="lg:col-span-4 flex flex-col gap-gutter">
                            <!-- Share -->
                            <div class="border-2 border-black bg-white p-6 sticky top-24">
                                <h4 class="font-label-mono text-label-mono uppercase mb-4 border-b border-black pb-2">COMPARTIR ARTÍCULO</h4>
                                <button onclick="navigator.clipboard.writeText(window.location.href); this.innerText='¡ENLACE COPIADO!'" class="w-full border-2 border-black py-3 font-label-mono text-label-mono uppercase hover:bg-black hover:text-white transition-colors mb-3">COPIAR ENLACE</button>
                                <a href="../index.html" class="block w-full bg-black text-white py-3 font-label-mono text-label-mono uppercase text-center hover:bg-primary transition-colors">VER MÁS NOTICIAS</a>
                            </div>

                            <!-- Info Card -->
                            <div class="border-2 border-black bg-surface-container-highest p-6">
                                <div class="flex items-center gap-2 mb-3">
                                    <span class="material-symbols-outlined text-primary">info</span>
                                    <span class="font-label-mono text-label-mono uppercase">Datos del Artículo</span>
                                </div>
                                <div class="space-y-2 font-label-mono text-[11px]">
                                    <div class="flex justify-between border-b border-black/20 pb-1"><span class="text-tertiary">CATEGORÍA</span><span class="font-bold">${safeCat}</span></div>
                                    <div class="flex justify-between border-b border-black/20 pb-1"><span class="text-tertiary">PUBLICACIÓN</span><span class="font-bold">${dateStr}</span></div>
                                    <div class="flex justify-between"><span class="text-tertiary">REF</span><span class="font-bold">${safeRefId}</span></div>
                                </div>
                            </div>
                        </aside>
                    </div>
                  `;
              } else {
                  container.innerHTML = `<div class="text-center py-32"><span class="material-symbols-outlined text-8xl text-surface-dim mb-6">find_in_page</span><h2 class="font-headline-sm text-headline-sm uppercase mb-4">Noticia No Encontrada</h2><p class="font-body-md text-tertiary mb-8">El artículo que buscas no existe o ha sido eliminado.</p><a href="../index.html" class="inline-block bg-black text-white font-inter font-bold uppercase px-8 py-3 hover:bg-primary transition-colors">Regresar</a></div>`;
              }
          } catch (error) {
              console.error("Error:", error);
              container.innerHTML = `<div class="text-center py-32 text-primary"><span class="material-symbols-outlined text-8xl mb-6">wifi_off</span><h2 class="font-headline-sm text-headline-sm uppercase mb-4">Error de Conexión</h2><p class="font-body-md text-tertiary">No se pudo cargar la noticia.</p></div>`;
          }
      }

      loadNoticia();
    </script>
